name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build release binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir frontend build

      - name: Run Go tests
        run: go test ./...

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail

          version="${{ inputs.tag || github.ref_name }}"
          commit="${GITHUB_SHA}"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X main.version=${version} -X main.commit=${commit} -X main.date=${date}"

          mkdir -p dist

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<< "${target}"
            name="coding-broker_${version}_${goos}_${goarch}"
            output="dist/${name}/coding-broker"
            if [[ "${goos}" == "windows" ]]; then
              output="${output}.exe"
            fi

            mkdir -p "dist/${name}"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 go build \
              -trimpath \
              -ldflags="${ldflags}" \
              -o "${output}" \
              ./cmd/coding-broker

            cp README.md coding-broker.example.yaml "dist/${name}/"
            if [[ "${goos}" == "windows" ]]; then
              (cd dist && zip -qr "${name}.zip" "${name}")
            else
              tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            fi
          done

          (cd dist && shasum -a 256 *.tar.gz *.zip > checksums.txt)

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ inputs.tag || github.ref_name }}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/*.tar.gz dist/*.zip dist/checksums.txt --clobber
          else
            gh release create "${tag}" \
              dist/*.tar.gz \
              dist/*.zip \
              dist/checksums.txt \
              --title "${tag}" \
              --generate-notes
          fi
